name: Auto Update V2Ray Configs

on:
  schedule:
    # هر 30 دقیقه یکبار اجرا شود
    - cron: '*/30 * * * *'
  workflow_dispatch:   # امکان اجرای دستی

jobs:
  update-sub:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # برای commit تغییرات لازم است

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 Run update script
        run: python update.py

      - name: 📊 Show result stats
        run: |
          echo "📈 تعداد لاین‌های sub.txt:"
          wc -l sub.txt
          echo "📏 حجم فایل:"
          ls -lh sub.txt

      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sub.txt
          git diff --staged --quiet || git commit -m "auto-update sub.txt $(date '+%Y-%m-%d %H:%M:%S')"
          git push
